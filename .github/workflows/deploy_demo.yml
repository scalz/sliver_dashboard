name: Deploy Web Demo

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Demo
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-demo]'))

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install package dependencies
        run: flutter pub get

      - name: Install example dependencies
        run: |
          cd example
          flutter pub get

      - name: Build Flutter Web
        run: |
          cd example
          flutter build web --release --base-href "/sliver_dashboard_web_demo/"

      - name: Deploy to sliver_dashboard_web_demo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.SLIVER_DASHBOARD_DEMO_DEPLOY_TOKEN }}
          repository-name: scalz/sliver_dashboard_web_demo
          branch: main
          folder: example/build/web
          clean: true